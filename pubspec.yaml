name: paradise_again
description: CROC — MCA Broker Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  intl: ^0.19.0
  http: ^1.2.0
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  onesignal_flutter: ^5.2.7
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/croc.png"
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: "assets/images/croc.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
